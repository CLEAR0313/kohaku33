<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>恋愛・花タイプ診断</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body {
  font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;
  background:#fff6ea;
  margin:0;
}
.content{
  max-width:600px;
  margin:30px auto;
  padding:20px;
  background:#fff;
  border-radius:16px;
}
button{
  margin-top:25px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:10px;
  background:#ff5ca8;
  color:#fff;
}
#result{margin-top:20px;}
</style>
</head>

<body>

<div class="content">
<h2>恋愛 花タイプ診断</h2>

<form id="flowerForm">

<p>Q1</p>
<label><input type="radio" name="q1" value="A" required>はい</label>
<label><input type="radio" name="q1" value="B">普通</label>
<label><input type="radio" name="q1" value="C">いいえ</label>

<p>Q2</p>
<label><input type="radio" name="q2" value="A" required>はい</label>
<label><input type="radio" name="q2" value="B">普通</label>
<label><input type="radio" name="q2" value="C">いいえ</label>

<p>Q3</p>
<label><input type="radio" name="q3" value="A" required>はい</label>
<label><input type="radio" name="q3" value="B">普通</label>
<label><input type="radio" name="q3" value="C">いいえ</label>

<p>Q4</p>
<label><input type="radio" name="q4" value="A" required>はい</label>
<label><input type="radio" name="q4" value="B">普通</label>
<label><input type="radio" name="q4" value="C">いいえ</label>

<p>Q5</p>
<label><input type="radio" name="q5" value="A" required>はい</label>
<label><input type="radio" name="q5" value="B">普通</label>
<label><input type="radio" name="q5" value="C">いいえ</label>

<p>Q6</p>
<label><input type="radio" name="q6" value="A" required>はい</label>
<label><input type="radio" name="q6" value="B">普通</label>
<label><input type="radio" name="q6" value="C">いいえ</label>

<button type="submit">診断する</button>
</form>

<div id="result"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

const form = document.getElementById("flowerForm");
const result = document.getElementById("result");

form.addEventListener("submit", function(e){
e.preventDefault();

function count(arr){
let c={A:0,B:0,C:0};
arr.forEach(v=>c[v]++);
return Object.keys(c).reduce((a,b)=>c[a]>=c[b]?a:b);
}

const star = count([form.q1.value,form.q2.value,form.q3.value]);
const heart = count([form.q4.value,form.q5.value,form.q6.value]);

const data = {

"A_A": `【☆A】【♡A】
🌹バラ：愛が深く、まっすぐで一度好きになると揺らぎにくいタイプ

恋の始まり：直感で惹かれやすく一気に気持ちが高まりやすい

長所：一途・情熱的、誰よりも深い愛を注ぐことができる

短所：愛が深いぶん不安にも揺れやすく、不安が強くなるほど依存しやすい
理想の交際：頻繁に会う・話すなど濃い繋がりが安心する

魅力：深い愛情・一途さ・包容力


✓ここで気になる質問👀
彼は貴方からの愛の熱量をどれくらい(どのように)感じていると思う？

この答えは診断だけでは分かりません💦
鑑定師様があなた専用に読み解きます🔮
答えを見に行く🔍`,

"A_B": `【☆A】【♡B】 
🏵️ガーベラ ：まじめで前向き、愛情も深く相手のペースも大事にしたいタイプ
恋の始まり：時間をかけてじわじわと気持ちが深まる

長所：健気で優しく相手を支える力がある

短所：相手に尽くして自分を犠牲にすればするほど依存もしやすい

理想の交際：会う時はしっかり向き合いたいし会えない時は相手を尊重したい

魅力：誠実・健気・前向きさ

✓ここで気になる質問👀
彼は貴方からの優しさをどう受け取っていると思う？

この答えは診断だけでは分かりません💦
鑑定師様があなた専用に読み解きます🔮
答えを見に行く🔍`

// ↓以下も同じように全部コピペで入れる（省略なし）
};

const key = star + "_" + heart;

result.innerHTML = `
<pre style="white-space:pre-wrap;font-size:14px;line-height:1.8;">
${data[key]}
</pre>
`;

});

});
</script>

</body>
</html>
